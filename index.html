<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijak Math Tahun 3</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #dcfce7 100%); user-select: none; }
        .btn-bounce { transition: transform 0.1s ease; }
        .btn-bounce:active { transform: scale(0.92); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 2; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start overflow-x-hidden antialiased text-slate-800">

    <div class="max-w-md w-full mx-auto bg-white/80 backdrop-blur-md min-h-screen shadow-2xl flex flex-col relative pb-6 border-x border-white/40">
        
        <header id="appHeader" class="hidden bg-gradient-to-r from-blue-500 to-cyan-500 text-white p-4 rounded-b-3xl shadow-lg sticky top-0 z-40">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <span class="text-2xl">👤</span>
                    <div>
                        <div id="headerName" class="font-black text-base truncate max-w-[100px]">Nama</div>
                        <div class="flex items-center text-xs text-yellow-200">
                            <span class="mr-1">⭐</span> <span id="headerStars" class="font-bold">0</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="openSettings()" class="btn-bounce text-xl p-1 cursor-pointer">⚙️</button>
                    <button onclick="logoutProfile()" class="btn-bounce text-xl p-1 cursor-pointer">🚪</button>
                </div>
            </div>
        </header>

        <main class="flex-grow p-5 flex flex-col justify-center">
            <!-- [Bahagian 1-7 kekal sama, hanya pastikan ID elemen diletakkan untuk translate] -->
            <section id="viewWelcome" class="flex flex-col items-center text-center space-y-8 py-8">
                <h1 class="text-4xl font-extrabold text-blue-600" id="welcomeTitle">Bijak Math</h1>
                <button onclick="navigateTo('viewProfile')" class="bg-blue-500 text-white font-black text-2xl py-4 px-8 rounded-2xl w-full" id="btnWelcomeStart">Mula Belajar</button>
            </section>

            <!-- (Sila pastikan struktur HTML anda yang lain dikekalkan di sini) -->
        </main>

        <!-- MODAL TETAPAN -->
        <div id="modalSettings" class="hidden absolute inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-5">
            <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4">
                <h3 class="text-xl font-black">⚙️ Tetapan / Settings</h3>
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                    <span>🔔 Sound</span>
                    <button id="btnSoundToggle" onclick="toggleSound()" class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs">HIDUP</button>
                </div>
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                    <span>🌐 Language</span>
                    <button id="btnLangToggle" onclick="toggleLanguage()" class="bg-blue-500 text-white px-4 py-2 rounded-lg text-xs font-bold">MS / EN</button>
                </div>
                <button onclick="closeSettings()" class="w-full bg-slate-200 p-3 rounded-xl">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        // Data Terjemahan
        const LANG = {
            ms: { welcomeTitle: "Bijak Math", btnWelcomeStart: "Mula Belajar", profileTitle: "Daftar Profil" },
            en: { welcomeTitle: "Smart Math", btnWelcomeStart: "Start Learning", profileTitle: "Register Profile" }
        };

        let currentLang = 'ms';

        function toggleLanguage() {
            currentLang = currentLang === 'ms' ? 'en' : 'ms';
            applyLanguage();
        }

        function applyLanguage() {
            const strings = LANG[currentLang];
            // Update teks berdasarkan ID
            Object.keys(strings).forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerText = strings[id];
            });
            // Update button text
            document.getElementById('btnLangToggle').innerText = currentLang.toUpperCase();
        }

        // ... [Sambungan fungsi asal anda seperti logoutProfile, navigateTo, dll] ...
        
        // Panggil applyLanguage() setiap kali navigasi jika perlu
    </script>
</body>
</html>
